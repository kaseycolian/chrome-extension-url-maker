<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon URL Maker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="grid-bg"></div>
    <main class="card">
      <h1 class="title">URL&nbsp;MAKER</h1>

      <div class="group">
        <label class="field">
          <span class="field-label">Base URL</span>
          <div class="input-wrap">
            <input id="base-url" type="text" placeholder="https://site.com" autocomplete="off" spellcheck="false" />
            <button id="base-url-hist" type="button" class="hist-btn" title="Saved Base URLs" aria-label="Saved Base URLs">▾</button>
          </div>
          <div id="base-url-dropdown" class="dropdown" hidden></div>
        </label>
        <label class="field">
          <span class="field-label sub">Name (optional)</span>
          <input id="base-url-name" type="text" class="name-input" placeholder="e.g. Acme staging" autocomplete="off" spellcheck="false" />
        </label>
      </div>

      <div class="group">
        <label class="field">
          <span class="field-label">Route</span>
          <div class="input-wrap">
            <input id="route" type="text" placeholder="api/users" autocomplete="off" spellcheck="false" />
            <button id="route-hist" type="button" class="hist-btn" title="Saved Routes" aria-label="Saved Routes">▾</button>
          </div>
          <div id="route-dropdown" class="dropdown" hidden></div>
        </label>
        <label class="field">
          <span class="field-label sub">Name (optional)</span>
          <input id="route-name" type="text" class="name-input" placeholder="e.g. Orders (admin)" autocomplete="off" spellcheck="false" />
        </label>
      </div>

      <label class="field">
        <span class="field-label">Token</span>
        <input id="token" type="text" placeholder="abc123" autocomplete="off" spellcheck="false" />
      </label>

      <div class="buttons">
        <button id="create-btn" type="button" class="btn btn-create">Create</button>
        <button id="create-go-btn" type="button" class="btn btn-go">Create &amp; Go</button>
      </div>

      <div id="result" class="result" hidden>
        <span class="result-label">Your URL</span>
        <code id="result-url" class="result-url"></code>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
